<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toaster</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-zinc-950 min-h-screen text-white">
    <!-- CREATE TOASTER -->
    <!-- <div class="parent p-10 flex flex-col gap-2">
    </div> -->

    <!-- this in event handler -->
    <!-- <h1>hey</h1> -->

    <!-- Application -->
    <!-- Form -->
    <div class="flex justify-center pt-12">
      <div
        class="w-full max-w-md bg-zinc-900 p-8 rounded-xl border border-zinc-800 shadow-lg"
      >
        <h2 class="text-2xl font-bold text-center mb-6">Add User</h2>

        <form id="userForm" class="space-y-4">
          <div>
            <label class="block text-sm mb-1">Name</label>
            <input
              id="name"
              type="text"
              class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-500"
            />
          </div>

          <div>
            <label class="block text-sm mb-1">Role</label>
            <input
              id="role"
              type="text"
              class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-500"
            />
          </div>

          <div>
            <label class="block text-sm mb-1">Bio</label>
            <textarea
              id="bio"
              rows="4"
              class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-500 resize-none"
            ></textarea>
          </div>

          <div>
            <label class="block text-sm mb-1">Photo URL</label>
            <input
              id="photo"
              type="text"
              class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 outline-none focus:border-zinc-500"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-zinc-800 hover:bg-zinc-700 transition py-2 rounded font-medium"
          >
            Submit
          </button>
        </form>
      </div>
    </div>

    <!-- Cards -->
    <div
      id="cardContainer"
      class="max-w-6xl mx-auto px-6 py-12 flex flex-wrap justify-center gap-6"
    >
      <!-- Card -->
      <div
        class="w-72 bg-zinc-900 border border-zinc-800 rounded-xl p-6 text-center"
      >
        <img
          src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200"
          alt=""
          class="w-20 h-20 rounded-full mx-auto object-cover border-2 border-zinc-700"
        />

        <h3 class="mt-4 text-xl font-semibold">John Doe</h3>

        <p class="text-zinc-400 text-sm mt-1">Frontend Developer</p>

        <p class="text-zinc-300 text-sm mt-4 leading-relaxed">
          Loves building beautiful UIs and learning new technologies.
        </p>
      </div>

      <!-- Card -->
      <div
        class="w-72 bg-zinc-900 border border-zinc-800 rounded-xl p-6 text-center"
      >
        <img
          src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200"
          alt=""
          class="w-20 h-20 rounded-full mx-auto object-cover border-2 border-zinc-700"
        />

        <h3 class="mt-4 text-xl font-semibold">Jane Smith</h3>

        <p class="text-zinc-400 text-sm mt-1">Backend Engineer</p>

        <p class="text-zinc-300 text-sm mt-4 leading-relaxed">
          Enjoys solving complex problems and optimizing APIs.
        </p>
      </div>

      <!-- Card -->
      <div
        class="w-72 bg-zinc-900 border border-zinc-800 rounded-xl p-6 text-center"
      >
        <img
          src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200"
          alt=""
          class="w-20 h-20 rounded-full mx-auto object-cover border-2 border-zinc-700"
        />

        <h3 class="mt-4 text-xl font-semibold">Alex Lee</h3>

        <p class="text-zinc-400 text-sm mt-1">UI/UX Designer</p>

        <p class="text-zinc-300 text-sm mt-4 leading-relaxed">
          Passionate about user experience and clean design.
        </p>
      </div>
    </div>

    <script src="JsAdvance.js"></script>
  </body>
</html>
